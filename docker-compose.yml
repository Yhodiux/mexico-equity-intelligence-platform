services:
  pipeline:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             python src/ingestion/ingest_yfinance.py &&
             python src/transformation/build_silver.py &&
             python src/quality/validate_data_quality.py"
